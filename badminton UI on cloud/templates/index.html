<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>羽智云 - AI羽毛球分析平台</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }

        .upload-area {
            border: 2px dashed #ccc;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            margin: 20px 0;
        }

        button {
            background: #2d5a2c;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        #result {
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <h1>🏸 羽智云 · AI羽毛球技战术分析平台</h1>
    <p>上传你的比赛视频，AI将自动分析击球点、跑动轨迹和战术数据</p>

    <div class="upload-area" id="dropZone">
        <p>📁 拖拽视频到此处，或点击选择文件</p>
        <input type="file" id="fileInput" accept=".mp4,.avi,.mov" style="display:none">
        <button onclick="selectFile()">选择视频</button>
    </div>

    <div id="result"></div>

    <script>
        let selectedFile = null;

        function selectFile() {
            document.getElementById('fileInput').click();
        }

        document.getElementById('fileInput').addEventListener('change', function(e) {
            selectedFile = e.target.files[0];
            if (selectedFile) {
                uploadFile();
            }
        });

        // 拖拽上传
        const dropZone = document.getElementById('dropZone');
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.style.borderColor = '#2d5a2c'; });
        dropZone.addEventListener('dragleave', () => { dropZone.style.borderColor = '#ccc'; });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = '#ccc';
            selectedFile = e.dataTransfer.files[0];
            uploadFile();
        });

        async function uploadFile() {
            if (!selectedFile) return;

            const formData = new FormData();
            formData.append('file', selectedFile);

            document.getElementById('result').innerHTML = '<p>⏳ 上传中，请稍后...</p>';

            try {
                // 上传
                const uploadRes = await fetch('/upload', { method: 'POST', body: formData });
                const uploadData = await uploadRes.json();

                if (uploadData.error) {
                    document.getElementById('result').innerHTML = `<p>❌ 上传失败：${uploadData.error}</p>`;
                    return;
                }

                document.getElementById('result').innerHTML = '<p>🔄 视频上传成功，正在进行AI分析，请稍候...</p>';

                // 调用分析接口
                const analyzeRes = await fetch(`/analyze/${uploadData.filename}`);
                const result = await analyzeRes.json();

                document.getElementById('result').innerHTML = `
                    <h3>📊 分析结果</h3>
                    <p>🎯 击球次数：${result.shots} 次</p>
                    <p>⚡ 最快杀球速度：${result.smash_speed} km/h</p>
                    ${result.hotspot ? `<img src="${result.hotspot}" style="max-width:100%; margin-top:10px;">` : ''}
                `;
            } catch (err) {
                document.getElementById('result').innerHTML = `<p>❌ 分析失败：${err.message}</p>`;
            }
        }

        // 定期检查服务健康状态
        setInterval(async () => {
            try {
                const res = await fetch('/health');
                const data = await res.json();
                console.log('服务状态:', data.status);
            } catch(e) {
                console.warn('服务连接异常');
            }
        }, 30000);
    </script>
</body>
</html>
